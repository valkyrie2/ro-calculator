  <span class="px-2">{{ lastestVersion }}</span>
  <button pButton class="p-button-text p-button-info" (click)="showUpdateDialog()">
    <i *ngIf="showUnreadVersion > 0" class="pi pi-bell text-xl" severity="danger" pBadge value="{{ showUnreadVersion }}"></i>
    <i *ngIf="showUnreadVersion === 0" class="pi pi-bell text-xl" severity="danger"></i>
  </button>
  <button pButton class="pl-2 p-button-text p-button-info p-button-raised" (click)="showReferenceDialog()">References</button>

  <div class="router-link px-3" style="position: relative; top: -5px">
    <p-tabMenu [model]="items" [activeItem]="activeItem">
      <ng-template pTemplate="item" let-item>
        <a class="flex justify-content-between align-items-center" [routerLink]="item.routerLink">
          <div>
            <span [class]="item.icon"></span>
            <span> {{ item.label }}</span>
          </div>
          <span *ngIf="item.isNew" class="p-tag p-tag-warning ml-2">NEW</span>
        </a>
      </ng-template>
    </p-tabMenu>
  </div>

  <div class="topbar-ad-slot">
    <app-ad-slot
      slot="1332897611"
      [width]="468"
      [height]="60"
    ></app-ad-slot>
  </div>

    </div>
  </div> -->

  <div #topbarmenu class="layout-topbar-menu" [ngClass]="{ 'layout-topbar-menu-mobile-active': layoutService.state.profileSidebarVisible }">
    <app-banner></app-banner>
    <button
      pButton
      pRipple
      type="button"
      icon="pi pi-exclamation-triangle"
      label="Report Bug"
      class="font-bold p-button-warning p-button-sm align-self-center mr-2"
      pTooltip="Report a bug or issue"
      tooltipPosition="bottom"
      (click)="openReportBug()"
    ></button>
    <!-- <button class="p-link layout-topbar-button">
            <i class="pi pi-calendar"></i>
            <span>Calendar</span>
        </button>
        <button class="p-link layout-topbar-button">
            <i class="pi pi-user"></i>
            <span>Profile</span>
        </button>
        <button class="p-link layout-topbar-button" [routerLink]="'/documentation'">
            <i class="pi pi-cog"></i>
            <span>Settings</span>
        </button> -->

    <!-- HIDDEN: youtube link
    <a class="flex align-items-center gap-2 px-2 mx-2 my-1 youtube-link" target="_blank" href="{{ env.youtubeVideoUrl }}">
      <i class="pi pi-youtube text-4xl text-red-500"></i>
      <span class="text-xl text-white-alpha-90">วิธีใช้งาน</span>
    </a>
    -->
    <a #survey [hidden]="true" href="{{ env.surveyUrl }}" target="_blank" rel="noreferrer noopener"> </a>
    <a #tracking [hidden]="true" href="{{ env.issueTrackingUrl }}" target="_blank" rel="noreferrer noopener"> </a>
    <!-- HIDDEN: Request/Report and Issues Tracking
    <div class="flex align-items-center">
      <button
        class="font-bold p-button-danger p-button-rounded p-button-raised"
        icon="pi pi-exclamation-triangle"
        pButton
        pRipple
        label="Request / Report"
        (click)="survey.click()"
      ></button>
      <button
        class="font-bold p-button-info p-button-rounded p-button-raised"
        icon="pi pi-exclamation-triangle"
        pButton
        pRipple
        label="Issues Tracking"
        (click)="tracking.click()"
      ></button>
      [suppressed support button]
    </div>
    -->
    <div *ngIf="!!username" class="ml-3 flex align-items-center">
      <p-chip label="{{ username }}" icon="pi pi-google" class="chip-profile" styleClass="text-xl"></p-chip>
      <button class="p-link layout-topbar-button mx-0 icon-user" (click)="showMyProfile()">
        <i class="pi pi-user"></i>
      </button>
      <button pButton class="p-button-text p-button-danger" (click)="logout()">
        <i class="pi pi-sign-out text-xl"></i>
      </button>
    </div>
    <button
      *ngIf="!username"
      pButton
      pRipple
      type="button"
      icon="pi pi-sign-in"
      label="Login"
      class="font-bold p-button-secondary p-button-sm ml-3 align-self-center"
      (click)="openLogin()"
    ></button>
  </div>
  <p-dialog header="Support" [draggable]="false" [resizable]="false" [modal]="true" [(visible)]="visible" [style]="{ 'min-width': '300px' }">
    <div class="card flex flex-column align-items-center gap-2 flex-wrap">
      <div>
        <img src="assets/demo/images/others/qr.jpg" alt="QR" style="width: 300px" />
      </div>
      <div class="font-bold" style="background-color: var(--surface-0); color: var(--green-400)">ขอบคุณครับบบบ</div>
      <div>
        <a href="https://web.facebook.com/zfehu.oivgwhy" target="_blank" rel="noreferrer noopener">
          <p-chip label="Tong Aphisit" icon="pi pi-facebook"></p-chip>
        </a>
      </div>
    </div>
  </p-dialog>

  <p-dialog header="ข้อมูลเพิ่มเติม" [draggable]="false" [resizable]="false" [modal]="true" [(visible)]="visibleInfo" [style]="{ width: '50vw' }">
    <div class="card flex flex-column align-items-center gap-2 flex-wrap">
      <ul>
        <li *ngFor="let info of infos">{{ info }}</li>
      </ul>

      <div>
        แจ้งปัญหา IB
        <a href="https://web.facebook.com/zfehu.oivgwhy" target="_blank" rel="noreferrer noopener">
          <p-chip label="Tong Aphisit" icon="pi pi-facebook"></p-chip>
        </a>
      </div>
    </div>
  </p-dialog>

  <p-dialog
    [draggable]="false"
    [resizable]="false"
    [modal]="true"
    [(visible)]="visibleUpdate"
    (onHide)="onHideUpdateDialog()"
    [style]="{ height: '70vh' }"
    [position]="'top'"
    [dismissableMask]="true"
  >
    <ng-template pTemplate="header">
      <div class="flex">
        <span class="text-xl mr-3 font-medium">CHANGELOG</span>
        <a class="flex align-items-center gap-2 px-2 youtube-link" target="_blank" href="{{ env.youtubeVideoUrl }}">
          <i class="pi pi-youtube text-4xl text-red-500"></i>
          <span class="text-xl text-white-alpha-90">วิธีใช้งาน</span>
        </a>
      </div>
    </ng-template>

    <div *ngFor="let update of updates; index as i" [ngStyle]="{ color: i + 1 > showUnreadVersion ? 'var(--gray-300)' : 'white' }">
      <div class="grid grid-nogutter">
        <div class="p-col-12" style="display: flex; align-content: center; justify-content: center; align-items: center">
          <button
            pButton
            type="button"
            class="p-button-text p-button-sm p-button-secondary mr-1"
            [icon]="collapsedVersions.has(i) ? 'pi pi-chevron-right' : 'pi pi-chevron-down'"
            (click)="toggleVersionCollapse(i)"
            style="padding: 0.15rem 0.3rem;"
          ></button>
          <span class="pr-2">{{ update.v }}</span>
          <span>{{ update.date }} </span>
          <span>
            <button
              *ngIf="unreadVersion === -1 || unreadVersion > i"
              pButton
              class="p-button-text p-button-primary"
              icon="pi pi-eye"
              (click)="onReadUpdateClick(update.v)"
            ></button>
            <i *ngIf="!(unreadVersion === -1 || unreadVersion > i)" class="pi pi-fw pi-eye-slash ml-2"></i>
          </span>
        </div>
      </div>
      <ul class="mt-0" *ngIf="!collapsedVersions.has(i)">
        <li *ngFor="let log of update.logs">{{ log }}</li>
      </ul>
    </div>
  </p-dialog>

  <p-dialog header="References" [draggable]="false" [resizable]="false" [modal]="true" [(visible)]="visibleReference" [dismissableMask]="true" [style]="{ width: '50vw', height: '70vh' }">
    <ul>
      <li *ngFor="let reference of references">
        <span class="">[ by {{ reference.writer }} ]</span>
        <span class="mx-2">{{ reference.label }}</span>
        <a href="{{ reference.link }}" target="_blank" rel="noreferrer noopener">Link</a>
      </li>
    </ul>
  </p-dialog>

  <p-dialog
    header="Sign in"
    [draggable]="false"
    [resizable]="false"
    [modal]="true"
    [(visible)]="visibleLogin"
    [dismissableMask]="true"
    [style]="{ width: 'min(440px, 95vw)' }"
  >
    <app-auth *ngIf="visibleLogin"></app-auth>
  </p-dialog>

  <p-dialog
    header="Report Bug"
    [draggable]="false"
    [resizable]="false"
    [modal]="true"
    [(visible)]="visibleReportBug"
    [dismissableMask]="!isSubmittingBugReport"
    [closable]="!isSubmittingBugReport"
    [style]="{ width: 'min(560px, 95vw)' }"
  >
    <div class="flex flex-column gap-3">
      <div>
        <label for="bugReportTitle" class="block mb-1 font-semibold">Title <span class="text-red-400">*</span></label>
        <input
          id="bugReportTitle"
          type="text"
          pInputText
          [(ngModel)]="bugReportTitle"
          [disabled]="isSubmittingBugReport"
          maxlength="200"
          placeholder="Short summary of the issue"
          class="w-full"
        />
      </div>
      <div>
        <label for="bugReportDescription" class="block mb-1 font-semibold">Description</label>
        <textarea
          id="bugReportDescription"
          pInputTextarea
          [(ngModel)]="bugReportDescription"
          [disabled]="isSubmittingBugReport"
          [autoResize]="true"
          rows="5"
          maxlength="4000"
          placeholder="Steps to reproduce, expected vs actual behaviour, class/items used, etc."
          class="w-full"
          style="min-height: 130px"
        ></textarea>
      </div>
      <div>
        <label for="bugReportImage" class="block mb-1 font-semibold">Attach image (optional)</label>
        <input
          #bugReportFileInput
          id="bugReportImage"
          type="file"
          accept="image/*"
          [disabled]="isSubmittingBugReport"
          (change)="onBugReportImageSelected($event)"
        />
        <div *ngIf="bugReportImageError" class="text-red-400 text-sm mt-1">{{ bugReportImageError }}</div>
        <div *ngIf="bugReportImagePreview" class="mt-2 flex align-items-start gap-2">
          <img [src]="bugReportImagePreview" alt="preview" style="max-width: 200px; max-height: 200px; border-radius: 4px" />
          <button
            pButton
            type="button"
            class="p-button-text p-button-sm p-button-danger"
            icon="pi pi-times"
            label="Remove"
            [disabled]="isSubmittingBugReport"
            (click)="clearBugReportImage(); bugReportFileInput.value = ''"
          ></button>
        </div>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <button
        pButton
        type="button"
        class="p-button-text"
        label="Cancel"
        [disabled]="isSubmittingBugReport"
        (click)="visibleReportBug = false"
      ></button>
      <button
        pButton
        type="button"
        class="p-button-warning"
        icon="pi pi-send"
        label="Submit"
        [loading]="isSubmittingBugReport"
        [disabled]="!bugReportTitle.trim() || isSubmittingBugReport"
        (click)="submitBugReport()"
      ></button>
    </ng-template>
  </p-dialog>
</div>
